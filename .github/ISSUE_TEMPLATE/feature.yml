name: "✨ Feature Request"
description: Suggest a new feature or improvement for CiCwtch.
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Please describe the feature clearly. If this is client-facing, specify **Client Portal** impact.

  - type: dropdown
    id: audience
    attributes:
      label: Primary Audience
      options:
        - Client Portal (Pet Owner)
        - Admin / Owner
        - Walker
        - Mixed / Multiple
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform Scope
      options:
        - Web
        - iOS
        - Android
        - Web + iOS
        - Web + Android
        - iOS + Android
        - All three (Web, iOS, Android)
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are we solving? Who is affected?
      placeholder: e.g. Clients struggle to understand what happened on a walk without a consistent visit report.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe how it should work in the app.
      placeholder: |
        Add a "Visit Report" screen for clients with:
        - route map
        - photos
        - notes
        - toileting/mood toggles
    validations:
      required: true

  - type: textarea
    id: user_stories
    attributes:
      label: User Stories
      description: Write 2–5 short user stories.
      placeholder: |
        - As a client, I want to view a visit report after each booking so I can see what happened.
        - As a walker, I want a quick template so I can write consistent notes.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true for this to be considered done?
      placeholder: |
        - Client can open a visit report from booking history
        - Report loads in under 2 seconds on web
        - Photos are viewable and downloadable
    validations:
      required: true

  - type: textarea
    id: ui_notes
    attributes:
      label: UI / UX Notes
      description: Include wireframes, screenshots, or notes about responsive behaviour.
      placeholder: e.g. On web, two-pane layout; on mobile, stacked layout.
    validations:
      required: false

  - type: textarea
    id: architecture
    attributes:
      label: Architecture / Technical Notes
      description: Any known domain entities, use cases, repositories, API endpoints, or packages?
      placeholder: |
        Domain: VisitReport, MediaAttachment
        API: GET /api/v1/client/visits/{id}
        Data: store cached reports offline for 30 days
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 (urgent / blocks core flow)
        - P1 (high value)
        - P2 (nice-to-have)
        - Unsure
    validations:
      required: true

  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: Must remain “Pure Flutter” (no external UI frameworks).
        - label: Must work on Web, iOS, and Android.
        - label: Must respect Clean Architecture layering.
        - label: Must include tests.
    validations:
      required: false
