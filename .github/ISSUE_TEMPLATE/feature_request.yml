name: Feature request
description: Propose a new feature or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Keep requests focused on the user problem first, solution second.
  - type: textarea
    id: problem
    attributes:
      label: Problem or user need
      description: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred approach.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: impact
    attributes:
      label: Likely impact area
      options:
        - UI / UX
        - Booking / scheduling
        - Customer management
        - Billing / invoicing
        - Notifications
        - Data / architecture
        - Security / compliance
        - Other
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
