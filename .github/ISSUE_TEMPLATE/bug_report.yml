name: Bug report
description: Report a defect, regression, or unintended behaviour.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue without guesswork.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps.
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - Other / Unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: Flutter version, browser/device, OS version, app version, and any relevant setup notes.
  - type: textarea
    id: evidence
    attributes:
      label: Logs, screenshots, or extra context
