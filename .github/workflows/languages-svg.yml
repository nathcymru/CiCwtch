name: Generate languages.svg

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "17 3 * * 1"  # Mondays 03:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tokei
        uses: taiki-e/install-action@v2
        with:
          tool: tokei

      - name: Generate tokei JSON
        run: |
          # Exclude non-code folders that can skew results.
          # Add/remove to match your repo structure.
          tokei --output json \
            --exclude brand \
            --exclude docs \
            --exclude .github \
            > /tmp/tokei.json

      - name: Build docs/languages.svg
        run: |
          python3 scripts/generate_languages_svg.py /tmp/tokei.json docs/languages.svg

      - name: Commit updated SVG (if changed)
        uses: EndBug/add-and-commit@v9
        with:
          add: "docs/languages.svg"
          message: "chore: update languages.svg"
          default_author: github_actions
