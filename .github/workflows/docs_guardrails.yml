name: Docs guardrails

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  docs-guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine bypass label
        id: bypass
        uses: actions/github-script@v7
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map(l => l.name.toLowerCase());
            const bypass = labels.includes('docs-not-required') || labels.includes('no-docs');
            core.setOutput('bypass', bypass ? 'true' : 'false');

      - name: Detect architecture-sensitive changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          list-files: shell
          filters: |
            arch_sensitive:
              - 'flutter/lib/domain/**'
              - 'flutter/lib/application/**'
              - 'flutter/lib/data/**'
              - 'flutter/lib/presentation/**'
              - 'flutter/pubspec.yaml'
              - 'flutter/analysis_options.yaml'
              - 'flutter/tools/**'
              - 'docs/schema/**'
              - 'docs/openapi/**'
              - 'docs/migrations/**'
              - 'db/**'
              - 'migrations/**'
              - 'schema/**'
              - 'openapi/**'
              - '**/*.sql'
            docs_changed:
              - 'docs/**'
              - 'README.md'
              - 'flutter/FLUTTER_README.md'

      - name: Fail if docs not updated for architecture-sensitive changes
        if: steps.bypass.outputs.bypass != 'true' && steps.changes.outputs.arch_sensitive == 'true' && steps.changes.outputs.docs_changed != 'true'
        run: |
          echo "❌ Architecture-sensitive files changed, but documentation was not updated."
          echo ""
          echo "What changed (arch-sensitive):"
          echo "${{ steps.changes.outputs.arch_sensitive_files }}"
          echo ""
          echo "Expected: update at least one doc under /docs (or README / flutter/FLUTTER_README.md)."
          echo ""
          echo "If docs genuinely do not need updating, add PR label: docs-not-required"
          exit 1

      - name: Pass
        if: steps.bypass.outputs.bypass == 'true' || steps.changes.outputs.arch_sensitive != 'true' || steps.changes.outputs.docs_changed == 'true'
        run: echo "✅ Docs guardrails passed."
