name: Privacy compliance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  privacy-checks:
    name: Fides and privacy guardrails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Fides CLI
        run: pip install 'ethyca-fides>=2,<3'

      - name: Validate Fides manifests
        run: fides --local parse

      - name: Evaluate local privacy policy resources
        run: |
          if find .fides -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) | grep -q .; then
            fides --local evaluate --dry || true
          else
            echo 'No Fides resources found.'
          fi

      - name: Check GDPR documentation pack exists
        run: |
          test -f docs/gdpr/README.md
          test -f docs/gdpr/ropa.md
          test -f docs/gdpr/dpia.md
          test -f docs/gdpr/retention_schedule.md
          test -f docs/gdpr/cnil_gap_audit.md

      - name: Check web entrypoint for third-party trackers
        run: |
          if grep -Eiq 'googletagmanager|google-analytics|gtag\(|clarity|hotjar|fullstory|segment|mixpanel|amplitude|sentry' flutter/web/index.html; then
            echo 'Potential tracker or analytics script detected in flutter/web/index.html.'
            echo 'Update docs/gdpr/consent_and_trackers.md and ensure opt-in logic is implemented before merge.'
            exit 1
          fi

      - name: Check for obvious privacy TODO placeholders in live docs
        run: |
          ! grep -RInE 'TODO privacy|TODO gdpr|placeholder' docs/gdpr .fides || {
            echo 'Privacy docs/manifests still contain unresolved placeholder markers.'
            exit 1
          }
