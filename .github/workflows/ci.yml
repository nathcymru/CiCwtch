name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  flutter-test-and-analyze:
    name: Flutter test and analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  flutter-build-web:
    name: Flutter build web
    runs-on: ubuntu-latest
    needs: flutter-test-and-analyze
    defaults:
      run:
        working-directory: flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build web (release)
        run: |
          BUILD_ARGS=(--release)
          if [ -n "${API_BASE_URL:-}" ]; then
            BUILD_ARGS+=(--dart-define="API_BASE_URL=$API_BASE_URL")
          fi
          if [ -n "${API_BEARER_TOKEN:-}" ]; then
            BUILD_ARGS+=(--dart-define="API_BEARER_TOKEN=$API_BEARER_TOKEN")
          fi
          flutter build web "${BUILD_ARGS[@]}"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          API_BEARER_TOKEN: ${{ secrets.API_BEARER_TOKEN }}

  worker-typecheck:
    name: Worker typecheck and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck

      - name: Run Worker tests
        run: npm test
