name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  flutter-test-and-analyze:
    name: Flutter test and analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter app
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  flutter-build-web:
    name: Flutter build web
    runs-on: ubuntu-latest
    needs: flutter-test-and-analyze
    defaults:
      run:
        working-directory: flutter
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release

  worker-typecheck:
    name: Worker typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci

      - name: Typecheck Worker
        run: npm run typecheck
