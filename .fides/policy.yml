- fides_key: cicwtch_gdpr_annotation_policy
  name: CiCwtch GDPR annotation policy
  organization_fides_key: cicwtch
  rules:
    - name: systems_must_reference_datasets
      description: Every declared system should reference at least one dataset.
      key: system.dataset_references
      operator: NOT_EMPTY
    - name: dataset_fields_should_be_tagged
      description: Dataset fields should carry privacy data categories.
      key: dataset.collections.fields.data_categories
      operator: NOT_EMPTY
