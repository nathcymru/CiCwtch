dataset:
  - fides_key: cicwtch_d1_dataset
    organization_fides_key: cicwtch
    name: CiCwtch D1 Dataset
    description: Current D1 schema inventory for the implemented CiCwtch Phase 1 application.
    collections:
      - name: clients
        fields:
          - name: id
            data_categories: [system.operations]
          - name: full_name
            data_categories: [user.name]
          - name: phone
            data_categories: [user.contact.phone_number]
          - name: email
            data_categories: [user.contact.email]
          - name: emergency_contact_name
            data_categories: [user.name]
          - name: emergency_contact_phone
            data_categories: [user.contact.phone_number]
          - name: notes
            data_categories: [user.behavioral]
      - name: addresses
        fields:
          - name: line_1
            data_categories: [user.contact.address.street]
          - name: line_2
            data_categories: [user.contact.address.street]
          - name: city
            data_categories: [user.contact.address.city]
          - name: county
            data_categories: [user.contact.address.state]
          - name: postcode
            data_categories: [user.contact.address.postal_code]
          - name: country_code
            data_categories: [user.contact.address.country]
          - name: access_notes
            data_categories: [user.behavioral]
      - name: client_contacts
        fields:
          - name: full_name
            data_categories: [user.name]
          - name: relationship_to_client
            data_categories: [user]
          - name: phone
            data_categories: [user.contact.phone_number]
          - name: email
            data_categories: [user.contact.email]
          - name: notes
            data_categories: [user]
      - name: dogs
        fields:
          - name: name
            data_categories: [system.operations]
          - name: veterinary_practice
            data_categories: [user]
          - name: medical_notes
            data_categories: [user.behavioral]
          - name: behavioural_notes
            data_categories: [user.behavioral]
          - name: feeding_notes
            data_categories: [user.behavioral]
      - name: walkers
        fields:
          - name: full_name
            data_categories: [user.name]
          - name: phone
            data_categories: [user.contact.phone_number]
          - name: email
            data_categories: [user.contact.email]
          - name: role_title
            data_categories: [user.employment]
          - name: start_date
            data_categories: [user.employment]
          - name: notes
            data_categories: [user.employment]
      - name: walker_compliance_items
        fields:
          - name: item_type
            data_categories: [user.employment]
          - name: reference_number
            data_categories: [user.employment]
          - name: notes
            data_categories: [user.employment]
      - name: walks
        fields:
          - name: scheduled_date
            data_categories: [system.operations]
          - name: scheduled_start_time
            data_categories: [system.operations]
          - name: scheduled_end_time
            data_categories: [system.operations]
          - name: actual_start_time
            data_categories: [system.operations]
          - name: actual_end_time
            data_categories: [system.operations]
          - name: notes
            data_categories: [user.behavioral]
      - name: walk_reports
        fields:
          - name: summary
            data_categories: [user.behavioral]
          - name: incident_notes
            data_categories: [user.behavioral]
      - name: invoice_headers
        fields:
          - name: invoice_number
            data_categories: [user.financial]
          - name: status
            data_categories: [user.financial]
          - name: notes
            data_categories: [user.financial]
      - name: invoice_lines
        fields:
          - name: description
            data_categories: [user.financial]
          - name: quantity
            data_categories: [user.financial]
          - name: unit_price_minor
            data_categories: [user.financial]
          - name: line_total_minor
            data_categories: [user.financial]
      - name: attachments
        fields:
          - name: original_filename
            data_categories: [user]
          - name: mime_type
            data_categories: [user]
      - name: audit_log
        fields:
          - name: actor_id
            data_categories: [system.operations]
          - name: change_summary
            data_categories: [system.operations]
