- fides_key: cicwtch_application
  name: CiCwtch Application
  organization_fides_key: cicwtch
  description: Flutter application and Cloudflare-backed operational platform for dog walking and pet care administration.
  system_type: Service
  privacy_declarations:
    - name: client_and_pet_management
      data_categories:
        - user.name
        - user.contact.email
        - user.contact.phone_number
        - user.contact.address
        - user.provided.identifiable
        - user.provided.identifiable.childrens_data
        - user.behavior
        - user.financial
        - user.health_and_medical
      data_use: essential.service.operations
      data_subjects:
        - customer
        - employee
      dataset_references:
        - cicwtch_d1_dataset
      lawful_basis_for_processing:
        - Legitimate interests
        - Contract
      processing_activities:
        - collect
        - store
        - use
        - update
        - delete
        - disclose
      retention_period: See docs/gdpr/retention_schedule.md
      cookies: []
      shared_with: []
